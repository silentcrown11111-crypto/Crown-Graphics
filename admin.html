<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crown Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Admin specific overrides */
        body {
            padding-top: 100px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .orders-table-wrapper {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            overflow-x: auto;
            padding: 20px;
        }

        body.light-theme .orders-table-wrapper {
            background: white;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th,
        td {
            padding: 16px;
            border-bottom: 1px solid var(--border-glass);
        }

        body.light-theme th,
        body.light-theme td {
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            color: var(--light-text-secondary);
        }

        th {
            font-weight: 600;
            color: white;
            white-space: nowrap;
        }

        body.light-theme th {
            color: var(--light-text-primary);
        }

        .status-badge {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <!-- Background Elements -->
    <div class="background-mesh"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <nav class="glass" style="padding: 10px 0; background: rgba(5, 11, 24, 0.95);">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <a href="index.html" class="logo-container">
                <div class="orb-ring"></div>
                <span class="logo">Crown Graphics</span>
            </a>
            <div style="display: flex; align-items: center; gap: 16px;">
                <button id="themeToggle" class="theme-btn" title="Toggle Light/Dark Mode">
                    <i class="fas fa-sun" style="display: none;"></i>
                    <i class="fas fa-moon"></i>
                </button>
                <a href="index.html" class="cta-button"
                    style="background: transparent; border: 1px solid var(--border-glass); color: white;">Back to
                    Site</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="admin-header">
            <div>
                <h1 style="font-size: 2.5rem; margin-bottom: 8px;">Order Dashboard</h1>
                <p style="color: var(--text-secondary);">Simulated backend viewing orders from localStorage.</p>
            </div>
            <button id="clearDataBtn" class="cta-button" style="background: #ef4444; border: none;"><i
                    class="fas fa-trash"></i> Clear All Data</button>
        </div>

        <div class="orders-table-wrapper">
            <table id="ordersTable">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Date</th>
                        <th>Service Target</th>
                        <th>Details (Scope / Priority)</th>
                        <th>Contact (Email / Method)</th>
                        <th>Custom Requirements</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="ordersBody">
                    <!-- Populated by admin.js -->
                </tbody>
            </table>
            <div id="emptyState" class="empty-state" style="display: none;">
                <i class="fas fa-inbox" style="font-size: 3rem; margin-bottom: 16px; opacity: 0.5;"></i>
                <h3>No orders found</h3>
                <p>Go to the main site and submit a quote request to see it appear here.</p>
            </div>
        </div>
    </main>

    <script src="admin.js"></script>
</body>

</html>
